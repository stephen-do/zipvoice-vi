services:
  tts:
    image: soar97/triton-zipvoice:24.12
    shm_size: '1gb'
    ports:
      - "9100:9100"
      - "9101:9101"
      - "9102:9102"
    environment:
      - PYTHONIOENCODING=utf-8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      TOKENIZER=espeak LANG=vi bash run.sh 2 4 zipvoice 